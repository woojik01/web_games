<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Brick Breaker - 벽돌깨기</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .game-container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .game-board {
            position: relative;
            width: 100%;
            max-width: 500px;
            aspect-ratio: 5 / 8;
            background: linear-gradient(45deg, #1a1a2e 0%, #16213e 100%);
            border: 3px solid #00d4ff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3), inset 0 0 20px rgba(0, 212, 255, 0.1);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: none;
        }

        .ui-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            font-family: 'Courier New', monospace;
            color: #00d4ff;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.8);
        }

        .score-display {
            font-size: clamp(14px, 4vw, 20px);
        }

        .level-display {
            font-size: clamp(14px, 4vw, 20px);
        }

        .game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 12, 41, 0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            animation: fadeIn 0.3s ease-in;
            color: #00d4ff;
            text-align: center;
        }

        .game-over-screen.show {
            display: flex;
        }

        .game-over-title {
            font-size: clamp(24px, 8vw, 48px);
            margin-bottom: 20px;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.8);
            letter-spacing: 3px;
        }

        .game-over-score {
            font-size: clamp(18px, 5vw, 32px);
            margin-bottom: 10px;
            font-family: 'Courier New', monospace;
        }

        .game-over-level {
            font-size: clamp(14px, 4vw, 20px);
            margin-bottom: 30px;
            font-family: 'Courier New', monospace;
            color: #ff006e;
        }

        .restart-btn {
            padding: 12px 30px;
            font-size: clamp(14px, 4vw, 18px);
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            border: none;
            color: #1a1a2e;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
        }

        .restart-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.8);
        }

        .restart-btn:active {
            transform: scale(0.98);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes particleFloat {
            to {
                opacity: 0;
                transform: translateY(-50px);
            }
        }

        .instructions {
            margin-top: 20px;
            text-align: center;
            color: #00d4ff;
            font-size: clamp(12px, 3vw, 14px);
            font-family: 'Courier New', monospace;
        }

        @media (max-width: 600px) {
            .game-container {
                padding: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-board" id="gameBoard">
            <canvas id="gameCanvas"></canvas>
            <div class="ui-overlay">
                <div class="score-display">Score: <span id="score">0</span></div>
                <div class="level-display">Level: <span id="level">1</span></div>
            </div>
            <div class="game-over-screen" id="gameOverScreen">
                <div class="game-over-title" id="gameOverTitle">GAME OVER</div>
                <div class="game-over-score">Score: <span id="finalScore">0</span></div>
                <div class="game-over-level">Level: <span id="finalLevel">1</span></div>
                <button class="restart-btn" onclick="location.reload()">RESTART</button>
            </div>
        </div>
        <div class="instructions">
            <div>🖱️ 마우스 이동 또는 👆 터치로 조종</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gameBoard = document.getElementById('gameBoard');

        // 반응형 캔버스 설정
        function resizeCanvas() {
            const rect = gameBoard.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // 게임 상태
        let gameState = {
            score: 0,
            level: 1,
            gameOver: false,
            activeBalls: []
        };

        // 게임 객체들
        class Paddle {
            constructor() {
                this.width = canvas.width * 0.15;
                this.height = canvas.height * 0.02;
                this.x = canvas.width / 2 - this.width / 2;
                this.y = canvas.height - canvas.height * 0.05;
                this.speed = canvas.width * 0.015;
            }

            update(mouseX) {
                this.x = mouseX - this.width / 2;
                this.x = Math.max(0, Math.min(this.x, canvas.width - this.width));
            }

            draw() {
                const gradient = ctx.createLinearGradient(this.x, this.y, this.x, this.y + this.height);
                gradient.addColorStop(0, '#00d4ff');
                gradient.addColorStop(0.5, '#0099cc');
                gradient.addColorStop(1, '#00ffff');
                ctx.fillStyle = gradient;
                ctx.fillRect(this.x, this.y, this.width, this.height);
                ctx.strokeStyle = '#00ffff';
                ctx.lineWidth = 2;
                ctx.strokeRect(this.x, this.y, this.width, this.height);
            }
        }

        class Ball {
            constructor(x, y, vx = 4, vy = -5) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.radius = canvas.width * 0.012;
                this.speed = 5 + gameState.level * 0.5;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                if (this.x - this.radius < 0 || this.x + this.radius > canvas.width) {
                    this.vx *= -1;
                    this.x = Math.max(this.radius, Math.min(canvas.width - this.radius, this.x));
                }

                if (this.y - this.radius < 0) {
                    this.vy *= -1;
                    this.y = Math.max(this.radius, this.y);
                }
            }

            collideWithPaddle(paddle) {
                if (this.y + this.radius >= paddle.y &&
                    this.y - this.radius <= paddle.y + paddle.height &&
                    this.x >= paddle.x &&
                    this.x <= paddle.x + paddle.width) {

                    this.vy *= -1;
                    const hitPos = (this.x - paddle.x) / paddle.width;
                    this.vx = (hitPos - 0.5) * 8;
                    this.y = paddle.y - this.radius;
                    createParticles(this.x, this.y, '#00ff00');
                    return true;
                }
                return false;
            }

            collideWithBrick(brick) {
                if (this.x + this.radius > brick.x &&
                    this.x - this.radius < brick.x + brick.width &&
                    this.y + this.radius > brick.y &&
                    this.y - this.radius < brick.y + brick.height) {

                    const overlapLeft = this.x + this.radius - brick.x;
                    const overlapRight = brick.x + brick.width - (this.x - this.radius);
                    const overlapTop = this.y + this.radius - brick.y;
                    const overlapBottom = brick.y + brick.height - (this.y - this.radius);

                    if (overlapLeft < overlapRight && overlapLeft < overlapTop && overlapLeft < overlapBottom) {
                        this.vx *= -1;
                    } else if (overlapTop < overlapBottom && overlapTop < overlapLeft && overlapTop < overlapRight) {
                        this.vy *= -1;
                    } else if (overlapRight < overlapLeft && overlapRight < overlapTop && overlapRight < overlapBottom) {
                        this.vx *= -1;
                    } else {
                        this.vy *= -1;
                    }

                    return true;
                }
                return false;
            }

            draw() {
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius);
                gradient.addColorStop(0, '#ffff00');
                gradient.addColorStop(1, '#ff6600');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#ffaa00';
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }

        class Brick {
            constructor(x, y, width, height) {
                this.x = x;
                this.y = y;
                this.width = width;
                this.height = height;
                this.color = ['#ff006e', '#00d4ff', '#00ff41', '#ffbe0b'][Math.floor(Math.random() * 4)];
                this.alive = true;
            }

            draw() {
                const gradient = ctx.createLinearGradient(this.x, this.y, this.x, this.y + this.height);
                gradient.addColorStop(0, this.color);
                gradient.addColorStop(1, this.adjustBrightness(this.color, -40));

                ctx.fillStyle = gradient;
                ctx.fillRect(this.x, this.y, this.width, this.height);
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 2;
                ctx.strokeRect(this.x, this.y, this.width, this.height);

                // 글로우 효과
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 10;
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 1;
                ctx.strokeRect(this.x + 1, this.y + 1, this.width - 2, this.height - 2);
                ctx.shadowBlur = 0;
            }

            adjustBrightness(color, percent) {
                const num = parseInt(color.replace("#", ""), 16);
                const amt = Math.round(2.55 * percent);
                const R = (num >> 16) + amt;
                const G = (num >> 8 & 0x00FF) + amt;
                const B = (num & 0x0000FF) + amt;
                return "#" + (0x1000000 + (R < 255 ? R < 1 ? 0 : R : 255) * 0x10000 +
                    (G < 255 ? G < 1 ? 0 : G : 255) * 0x100 +
                    (B < 255 ? B < 1 ? 0 : B : 255)).toString(16).slice(1);
            }
        }

        class PowerUp {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = canvas.width * 0.05;
                this.height = canvas.height * 0.03;
                this.vy = 2;
                this.type = Math.random() > 0.5 ? 'slow' : 'double';
                this.alive = true;
            }

            update() {
                this.y += this.vy;
                if (this.y > canvas.height) {
                    this.alive = false;
                }
            }

            draw() {
                const color = this.type === 'slow' ? '#00ff41' : '#ffbe0b';
                ctx.fillStyle = color;
                ctx.fillRect(this.x - this.width / 2, this.y, this.width, this.height);
                ctx.strokeStyle = color;
                ctx.lineWidth = 2;
                ctx.strokeRect(this.x - this.width / 2, this.y, this.width, this.height);

                ctx.fillStyle = '#000';
                ctx.font = 'bold 10px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(this.type === 'slow' ? '⊘' : '2', this.x, this.y + this.height - 3);
            }

            collideWithPaddle(paddle) {
                return this.x > paddle.x && this.x < paddle.x + paddle.width &&
                    this.y + this.height >= paddle.y &&
                    this.y <= paddle.y + paddle.height;
            }
        }

        // 파티클 시스템
        let particles = [];

        function createParticles(x, y, color) {
            for (let i = 0; i < 8; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6 - 2,
                    life: 1,
                    color: color
                });
            }
        }

        function updateParticles() {
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
                return p.life > 0;
            });
        }

        function drawParticles() {
            particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            });
        }

        // 게임 초기화
        let paddle = new Paddle();
        let bricks = [];
        let powerUps = [];

        function initBricks() {
            bricks = [];
            const rows = 3 + gameState.level;
            const cols = 6;
            const brickWidth = canvas.width / cols - 5;
            const brickHeight = canvas.height * 0.03;

            for (let row = 0; row < rows; row++) {
                for (let col = 0; col < cols; col++) {
                    const x = col * (brickWidth + 5) + 2.5;
                    const y = row * (brickHeight + 5) + canvas.height * 0.05;
                    bricks.push(new Brick(x, y, brickWidth, brickHeight));
                }
            }
        }

        function startGame() {
            gameState.score = 0;
            gameState.level = 1;
            gameState.gameOver = false;
            gameState.activeBalls = [];
            initBricks();
            paddle = new Paddle();

            const ball = new Ball(canvas.width / 2, canvas.height / 2);
            gameState.activeBalls.push(ball);

            update();
        }

        // 마우스/터치 이벤트
        let mouseX = canvas.width / 2;

        document.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
        });

        document.addEventListener('touchmove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.touches[0].clientX - rect.left;
        });

        // 게임 루프
        function update() {
            // 캔버스 그리기
            ctx.fillStyle = 'rgba(26, 26, 46, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 배경 그래디언트
            const bgGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            bgGradient.addColorStop(0, 'rgba(15, 12, 41, 0.3)');
            bgGradient.addColorStop(1, 'rgba(48, 43, 99, 0.2)');
            ctx.fillStyle = bgGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (!gameState.gameOver) {
                // 패들 업데이트
                paddle.update(mouseX);
                paddle.draw();

                // 볼 업데이트
                for (let i = gameState.activeBalls.length - 1; i >= 0; i--) {
                    const ball = gameState.activeBalls[i];
                    ball.update();
                    ball.draw();

                    // 패들 충돌
                    ball.collideWithPaddle(paddle);

                    // 벽돌 충돌
                    for (let j = bricks.length - 1; j >= 0; j--) {
                        if (ball.collideWithBrick(bricks[j])) {
                            bricks[j].alive = false;
                            bricks.splice(j, 1);
                            gameState.score += 10 * gameState.level;
                            createParticles(ball.x, ball.y, '#ff006e');

                            // 15% 확률로 파워업 생성
                            if (Math.random() < 0.15) {
                                powerUps.push(new PowerUp(ball.x, ball.y));
                            }

                            break;
                        }
                    }

                    // 볼이 화면 아래로 떨어짐
                    if (ball.y > canvas.height) {
                        gameState.activeBalls.splice(i, 1);
                    }
                }

                // 파워업 업데이트
                for (let i = powerUps.length - 1; i >= 0; i--) {
                    const powerUp = powerUps[i];
                    powerUp.update();
                    powerUp.draw();

                    if (powerUp.collideWithPaddle(paddle)) {
                        if (powerUp.type === 'slow') {
                            // 모든 볼의 속도 감소
                            gameState.activeBalls.forEach(b => {
                                b.vx *= 0.7;
                                b.vy *= 0.7;
                            });
                        } else {
                            // 새로운 볼 추가
                            const newBall = new Ball(paddle.x + paddle.width / 2, paddle.y - 10, 3, -4);
                            gameState.activeBalls.push(newBall);
                        }
                        createParticles(paddle.x + paddle.width / 2, paddle.y, '#00ff41');
                        powerUps.splice(i, 1);
                    } else if (!powerUp.alive) {
                        powerUps.splice(i, 1);
                    }
                }

                // 벽돌 그리기
                bricks.forEach(brick => brick.draw());

                // 게임 상태 체크
                if (gameState.activeBalls.length === 0) {
                    endGame();
                } else if (bricks.length === 0) {
                    levelUp();
                }
            }

            // 파티클 업데이트 및 그리기
            updateParticles();
            drawParticles();

            // UI 업데이트
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('level').textContent = gameState.level;

            requestAnimationFrame(update);
        }

        function endGame() {
            gameState.gameOver = true;
            document.getElementById('gameOverScreen').classList.add('show');
            document.getElementById('finalScore').textContent = gameState.score;
            document.getElementById('finalLevel').textContent = gameState.level;
            document.getElementById('gameOverTitle').textContent = gameState.activeBalls.length > 0 ? 'LEVEL CLEAR!' : 'GAME OVER';
        }

        function levelUp() {
            gameState.level++;
            initBricks();

            // 볼 초기화
            gameState.activeBalls = [];
            const ball = new Ball(canvas.width / 2, canvas.height / 2);
            gameState.activeBalls.push(ball);

            // 파워업 초기화
            powerUps = [];
        }

        // 게임 시작
        startGame();
    </script>
</body>
</html>
